<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive</title>
<style>
body{margin:0;background:#141414;color:white;font-family:Arial}
header{padding:20px;background:#000;position:sticky;top:0}
.logo{color:#e50914;font-size:32px;font-weight:bold}
.row{padding:20px}
.grid{display:flex;gap:16px;overflow-x:auto}
.card{min-width:260px;cursor:pointer;transition:.2s}
.card:hover{transform:scale(1.05)}
.card img{width:260px;height:146px;object-fit:cover;border-radius:6px}
.admin{padding:20px;background:#1d1d1d}
input,textarea{width:100%;margin:5px 0;padding:10px}
button{padding:10px 16px;background:#e50914;color:#fff;border:0}
#player{width:100%;height:70vh}
</style>
</head>
<body>
<header><div class="logo">ARCHIVE</div></header>

<div class="admin">
<h2>콘텐츠 추가</h2>
<input id="title" placeholder="제목">
<input id="thumb" placeholder="썸네일 URL">
<input id="youtube" placeholder="유튜브 URL">
<textarea id="desc" placeholder="설명"></textarea>
<button onclick="addItem()">등록</button>
</div>

<div class="row">
<h2>아카이브</h2>
<div id="content" class="grid"></div>
</div>

<div class="row">
<iframe id="player" allowfullscreen></iframe>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
