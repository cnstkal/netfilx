<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYFLIX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<link rel="preload" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
</noscript>
<style>
:root{
  --black:#0a0a0a; --bg:#141414; --panel:#181818; --panel2:#232323;
  --red:#e50914; --red-dark:#b0060f; --gray:#8c8c8c; --white:#f5f5f5;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg); color:var(--white);
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  overflow-x:hidden; letter-spacing:-0.02em;
}
::-webkit-scrollbar{height:8px; width:8px;}
::-webkit-scrollbar-thumb{background:#333; border-radius:4px;}
.hidden{display:none !important;}
button{cursor:pointer; font-family:inherit;}
img{display:block;}

/* PROFILE GATE */
#profileGate{
  position:fixed; inset:0; z-index:1000; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:60px;
}
#profileGate h1{font-size:32px; font-weight:700;}
.profile-list{display:flex; gap:50px; flex-wrap:wrap; justify-content:center;}
.profile-item{display:flex; flex-direction:column; align-items:center; gap:14px; cursor:pointer; opacity:.85; transition:opacity .2s, transform .2s;}
.profile-item:hover{opacity:1; transform:scale(1.06);}
.profile-avatar{
  width:130px; height:130px; border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:64px; box-shadow:0 6px 20px rgba(0,0,0,.6);
}
.profile-item span{font-size:16px; color:#ccc;}
@media(max-width:600px){
  .profile-avatar{width:90px; height:90px; font-size:44px;}
  #profileGate h1{font-size:22px; text-align:center; padding:0 20px;}
  .profile-list{gap:26px;}
}

/* NAV */
#nav{
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 40px; transition:background .3s ease;
  background:linear-gradient(180deg, rgba(0,0,0,.75) 0%, transparent 100%);
}
#nav.scrolled{background:var(--black); box-shadow:0 2px 10px rgba(0,0,0,.5);}
.nav-left{display:flex; align-items:center; gap:28px;}
.logo{font-family:'Bebas Neue', sans-serif; color:var(--red); font-size:32px; letter-spacing:2px; cursor:pointer;}
#navCategories{display:flex; gap:20px; font-size:14px; color:#e5e5e5;}
#navCategories span{cursor:pointer; opacity:.85; white-space:nowrap;}
#navCategories span:hover{opacity:1; font-weight:700;}
.nav-right{display:flex; align-items:center; gap:14px;}
#searchInput{
  width:0; opacity:0; padding:0; border:1px solid #fff; background:rgba(0,0,0,.75); color:#fff;
  transition:width .3s ease, opacity .3s, padding .3s; font-size:14px; height:34px;
}
#searchInput.open{width:220px; opacity:1; padding:0 10px;}
.icon-btn{background:none; border:none; color:#fff; font-size:18px;}
#adminBtn{
  background:transparent; border:1px solid #666; color:#fff; padding:6px 14px; font-size:13px; border-radius:2px;
}
#adminBtn:hover{border-color:#fff;}

/* HERO */
#hero{
  position:relative; height:80vh; min-height:420px; width:100%;
  background-size:cover; background-position:center top; display:flex; align-items:flex-end;
}
.hero-video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border:none; pointer-events:none;}
#hero::after{
  content:''; position:absolute; inset:0;
  background:linear-gradient(0deg, var(--bg) 0%, rgba(20,20,20,.2) 55%, rgba(20,20,20,.1) 100%),
             linear-gradient(90deg, rgba(0,0,0,.7) 0%, transparent 60%);
}
.hero-content{position:relative; z-index:2; padding:0 40px 60px; max-width:640px;}
.hero-content h1{font-family:'Bebas Neue', sans-serif; font-size:64px; letter-spacing:1px; line-height:1.05; margin-bottom:16px; text-shadow:2px 2px 8px rgba(0,0,0,.6);}
.hero-content p{font-size:16px; line-height:1.5; color:#e5e5e5; margin-bottom:20px; max-width:520px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
.hero-btns{display:flex; gap:12px;}
.btn{border:none; border-radius:4px; padding:11px 26px; font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px;}
.btn-play{background:#fff; color:#000;}
.btn-play:hover{background:rgba(255,255,255,.75);}
.btn-info{background:rgba(109,109,110,.7); color:#fff;}
.btn-info:hover{background:rgba(109,109,110,.4);}
.empty-hero{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;}
.empty-hero h2{font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--gray);}

/* ROWS */
#rows{position:relative; z-index:3; padding-top:30px; padding-bottom:60px;}
#rows.no-hero{padding-top:110px;}
.row{margin-bottom:38px;}
.row-title{font-size:19px; font-weight:700; padding:0 40px 8px; color:#e5e5e5;}
.row-track-wrap{position:relative;}
.row-track{display:grid; grid-template-columns:repeat(4,1fr); gap:24px; padding:0 40px;}
.row-arrow{display:none;}

.card{
  flex:0 0 auto; width:100%; aspect-ratio:16/9; height:auto; position:relative; border-radius:2px; overflow:hidden; cursor:pointer;
  background:#222; transition:transform .25s ease, z-index 0s; transform-origin:center;
}
.card:hover{transform:scale(1.12); z-index:10; box-shadow:0 10px 30px rgba(0,0,0,.7);}
.card img{width:100%; height:100%; object-fit:cover;}
.series-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:20px; padding:0 60px;}
.series-card{position:relative; aspect-ratio:9/16; border-radius:4px; overflow:hidden; cursor:pointer; background:#222; transition:transform .2s;}
.series-card img{width:100%; height:100%; object-fit:cover;}
.series-card::after{content:''; position:absolute; inset:0; background:linear-gradient(0deg, rgba(0,0,0,.85) 0%, transparent 55%);}
.series-card:hover{transform:scale(1.04);}
@media(max-width:768px){
  .series-grid{grid-template-columns:repeat(2,1fr); padding:0 16px; gap:12px;}
}
.card .cinfo{
  position:absolute; left:0; right:0; bottom:0; padding:10px 8px; background:linear-gradient(0deg, rgba(0,0,0,.92), transparent);
  opacity:0; transition:opacity .2s; font-size:12px; font-weight:700;
}
.card:hover .cinfo{opacity:1;}
.card .admin-actions{position:absolute; top:6px; left:6px; display:flex; gap:4px; opacity:0; transition:opacity .2s; z-index:20;}
.card:hover .admin-actions{opacity:1;}
.admin-mini{background:rgba(0,0,0,.75); border:1px solid #555; color:#fff; font-size:10px; padding:2px 6px; border-radius:2px;}
.admin-mini:hover{background:var(--red); border-color:var(--red);}
.wish-btn{
  position:absolute; bottom:8px; right:8px; z-index:15; width:26px; height:26px; border-radius:50%;
  background:rgba(0,0,0,.65); border:1px solid #777; color:#fff; font-size:14px; display:flex;
  align-items:center; justify-content:center; opacity:0; transition:opacity .2s;
}
.card:hover .wish-btn{opacity:1;}
.wish-btn.active{background:var(--red); border-color:var(--red);}

.grid-view{display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:16px; padding:20px 40px;}
.grid-view .card{width:100%; flex:none;}

/* TOP 10 RANK ROW */


/* MODAL (detail) */
.modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
.modal-box{background:var(--panel); width:100%; max-width:780px; max-height:88vh; overflow-y:auto; border-radius:8px; position:relative;}
.modal-box.modal-box-lg{max-width:1400px; width:94vw; background:#000;}
.modal-close{position:absolute; top:14px; right:14px; z-index:10; background:var(--black); border:none; color:#fff; width:34px; height:34px; border-radius:50%; font-size:18px;}
.modal-media{width:100%; aspect-ratio:16/9; background:#000; position:relative;}
.modal-media.photo-media{aspect-ratio:auto; max-height:82vh; display:flex; align-items:center; justify-content:center;}
.modal-media.photo-media img{width:auto; height:100%; max-height:82vh; max-width:100%;}
.modal-media iframe, .modal-media img{width:100%; height:100%; object-fit:contain; border:none;}
.modal-body{padding:24px 32px 32px;}
.modal-body h2{font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:1px; margin-bottom:6px;}
.modal-cat{color:var(--red); font-size:13px; font-weight:700; margin-bottom:12px;}
.modal-desc{color:#d2d2d2; line-height:1.6; font-size:15px; white-space:pre-wrap;}
.gallery-strip{display:flex; gap:8px; padding:14px 32px 0; overflow-x:auto;}
.gallery-strip img{width:90px; height:60px; object-fit:cover; border-radius:3px; cursor:pointer; opacity:.6; border:2px solid transparent;}
.gallery-strip img.active{opacity:1; border-color:var(--red);}

/* ADMIN PANEL */
.admin-box{background:var(--panel); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; border-radius:8px; padding:32px; position:relative;}
.admin-box h2{font-family:'Bebas Neue',sans-serif; font-size:28px; margin-bottom:20px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:13px; color:#ccc; margin-bottom:6px;}
.field input[type=text], .field input[type=email], .field input[type=password], .field input[type=url], .field textarea, .field select{
  width:100%; padding:10px 12px; background:#333; border:1px solid #555; color:#fff; border-radius:4px; font-size:14px; font-family:inherit;
}
.field input[type=file]{color:#ccc; font-size:13px;}
.field textarea{resize:vertical; min-height:70px;}
.field-row{display:flex; gap:12px;}
.field-row .field{flex:1;}
.check-row{display:flex; align-items:center; gap:8px; font-size:14px; color:#ccc; margin-bottom:16px;}
.admin-submit{width:100%; background:var(--red); color:#fff; border:none; padding:12px; border-radius:4px; font-size:15px; font-weight:700; margin-top:6px;}
.admin-submit:hover{background:var(--red-dark);}
.admin-cancel{width:100%; background:#333; color:#fff; border:1px solid #555; padding:10px; border-radius:4px; margin-top:8px; font-size:14px;}
.admin-tabs{display:flex; gap:8px; margin-bottom:20px; border-bottom:1px solid #333;}
.admin-tab{background:none; border:none; color:#999; padding:10px 4px; font-size:14px; border-bottom:2px solid transparent;}
.admin-tab.active{color:#fff; border-color:var(--red); font-weight:700;}
.admin-list-item{display:flex; align-items:center; gap:10px; padding:8px; background:#222; border-radius:4px; margin-bottom:8px;}
.admin-list-item img{width:56px; height:32px; object-fit:cover; border-radius:2px; flex-shrink:0;}
.admin-list-item .ali-title{flex:1; font-size:13px;}
.admin-list-item .ali-cat{font-size:11px; color:var(--gray);}
.ali-btn{background:#333; border:1px solid #555; color:#fff; font-size:11px; padding:5px 9px; border-radius:3px;}
.ali-btn.danger:hover{background:var(--red); border-color:var(--red);}
.status-msg{font-size:13px; padding:8px; border-radius:4px; margin-bottom:14px;}
.status-msg.err{background:rgba(229,9,20,.15); color:#ff8f95; border:1px solid rgba(229,9,20,.4);}
.status-msg.ok{background:rgba(70,180,90,.15); color:#8be89f; border:1px solid rgba(70,180,90,.4);}
.spinner-wrap{display:flex; align-items:center; justify-content:center; height:60vh;}
.spinner{width:44px; height:44px; border:4px solid #333; border-top-color:var(--red); border-radius:50%; animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#searchResultsTitle{padding:100px 40px 10px; font-size:20px; font-weight:700;}

@media(min-width:1600px){
  #nav{padding-left:calc(50vw - 760px); padding-right:calc(50vw - 760px);}
  .hero-content{padding-left:calc(50vw - 760px);}
  .row-title, .row-track, .series-grid{padding-left:calc(50vw - 760px); padding-right:calc(50vw - 760px);}
}
@media(max-width:768px){
  #nav{padding:12px 16px;} #navCategories{display:none;}
  .hero-content h1{font-size:38px;} .hero-content{padding:0 16px 40px;}
  .row-title, .row-track{padding-left:16px; padding-right:16px;}
  .row-track{grid-template-columns:repeat(2,1fr); gap:12px;}
  .card:hover{transform:scale(1.04);}
  .admin-box, .modal-box{max-width:96vw;}
  #searchResultsTitle{padding-left:16px;}
  .grid-view{padding:20px 16px;}
}
</style>
</head>
<body>

<div id="profileGate">
  <h1>시청할 프로필을 선택하세요</h1>
  <div class="profile-list">
    <div class="profile-item" onclick="chooseProfile('오렌지')">
      <div class="profile-avatar" id="pgAvatar-오렌지" style="background:radial-gradient(circle at 35% 30%, #ffb199, #e6664a);">🍊</div>
    </div>
    <div class="profile-item" onclick="chooseProfile('블루베리')">
      <div class="profile-avatar" id="pgAvatar-블루베리" style="background:radial-gradient(circle at 35% 30%, #6f7fe0, #2b2f8c);">🫐</div>
    </div>
    <div class="profile-item" onclick="chooseProfile('사과')">
      <div class="profile-avatar" id="pgAvatar-사과" style="background:radial-gradient(circle at 35% 30%, #c9f2b0, #6fae4e);">🍏</div>
    </div>
  </div>
</div>

<nav id="nav">
  <div class="nav-left">
    <span class="logo" id="logoBtn">MYFLIX</span>
    <div id="navCategories">
      <span data-p="블루베리" onclick="chooseProfile('블루베리')">홈</span>
      <span data-p="오렌지" onclick="chooseProfile('오렌지')">시리즈</span>
      <span data-p="사과" onclick="chooseProfile('사과')">인기 시리즈</span>
    </div>
  </div>
  <div class="nav-right">
    <input type="text" id="searchInput" placeholder="제목 검색">
    <button class="icon-btn" id="searchBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
    <button id="adminBtn">관리자</button>
  </div>
</nav>

<div id="loadingWrap" class="spinner-wrap"><div class="spinner"></div></div>

<header id="hero" class="hidden"></header>
<div id="searchResultsTitle" class="hidden"></div>
<main id="rows"></main>

<!-- Detail Modal -->
<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- Admin Modal -->
<div id="adminOverlay" class="modal-overlay hidden">
  <div class="admin-box" id="adminBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
/* ===================== CONFIG ===================== */
const CLOUDINARY_CLOUD = 'dbljkloal';
const CLOUDINARY_PRESET = 'Everything';

const firebaseConfig = {
  apiKey: "AIzaSyCYOD_csnOGvHW9p75iwNoTSlQ52vkBE_w",
  authDomain: "sns-b0b26.firebaseapp.com",
  projectId: "sns-b0b26",
  storageBucket: "sns-b0b26.firebasestorage.app",
  messagingSenderId: "55510156567",
  appId: "1:55510156567:web:15cf7f13b369852fe12352"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
try{ db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}

/* ===================== STATE ===================== */
let ITEMS = [];
let isAdmin = false;
let editingId = null;
let currentGalleryImages = [];
let wishlist = new Set();
let recentlyViewed = [];
let currentProfile = null;
const PROFILES = ['오렌지','블루베리','사과'];
const PROFILE_EMOJI = {'오렌지':'🍊','블루베리':'🫐','사과':'🍏'};
let PROFILE_IMAGES = {};
function applyProfileImages(){
  PROFILES.forEach(p=>{
    const el = document.getElementById('pgAvatar-'+p);
    if(!el) return;
    if(PROFILE_IMAGES[p]){
      el.style.background = `center/cover no-repeat url('${PROFILE_IMAGES[p]}')`;
      el.textContent = '';
    }
  });
}


/* ===================== PROFILE GATE ===================== */
function chooseProfile(name){
  currentProfile = name;
  try{
    wishlist = new Set(JSON.parse(localStorage.getItem('myflix_wish_'+name) || '[]'));
    recentlyViewed = JSON.parse(localStorage.getItem('myflix_recent_'+name) || '[]');
  }catch(e){ wishlist = new Set(); recentlyViewed = []; }
  document.getElementById('profileGate').classList.add('hidden');
  document.querySelectorAll('#navCategories span').forEach(s=>s.style.fontWeight = s.dataset.p===name?'700':'400');
  renderAll();
}
function saveProfileState(){
  if(!currentProfile) return;
  localStorage.setItem('myflix_wish_'+currentProfile, JSON.stringify([...wishlist]));
  localStorage.setItem('myflix_recent_'+currentProfile, JSON.stringify(recentlyViewed));
}

/* ===================== HELPERS ===================== */
function extractYoutubeId(url){
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : (/^[A-Za-z0-9_-]{11}$/.test(url.trim()) ? url.trim() : null);
}
async function uploadToCloudinary(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method:'POST', body: fd });
  if(!res.ok) throw new Error('Cloudinary 업로드 실패');
  const data = await res.json();
  return data.secure_url;
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(ts){
  if(!ts || !ts.toDate) return '';
  const d = ts.toDate();
  const yy = String(d.getFullYear()).slice(2);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return yy+mm+dd;
}

/* ===================== RENDER: NAV / HERO / ROWS ===================== */
function profileItems(){
  if(!currentProfile) return ITEMS;
  return ITEMS.filter(it => !it.profiles || it.profiles.length===0 || it.profiles.includes(currentProfile));
}
function groupByCategory(items){
  const map = {};
  items.forEach(it=>{
    const cat = it.category || '기타';
    if(!map[cat]) map[cat] = [];
    map[cat].push(it);
  });
  return map;
}

function renderHero(){
  const hero = document.getElementById('hero');
  hero.classList.remove('hidden');
  const pItems = profileItems();
  const featured = pItems.find(i=>i.featured) || pItems[0];
  if(!featured){
    hero.style.backgroundImage = 'none';
    hero.innerHTML = `<div class="empty-hero"><div><h2>아직 등록된 콘텐츠가 없습니다</h2><p style="color:#999;margin-top:8px;">관리자로 로그인해서 첫 콘텐츠를 추가해보세요.</p></div></div>`;
    return;
  }
  const wished = wishlist.has(featured.id);
  let heroVideo = '';
  if(featured.type === 'youtube' && featured.youtubeId){
    hero.style.backgroundImage = `url('${featured.thumbnailUrl}')`;
    heroVideo = `<iframe class="hero-video" src="https://www.youtube.com/embed/${featured.youtubeId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${featured.youtubeId}&modestbranding=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" frameborder="0"></iframe>`;
  } else {
    hero.style.backgroundImage = `url('${featured.thumbnailUrl}')`;
  }
  hero.innerHTML = heroVideo + `
    <div class="hero-content">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
        <span style="color:var(--red);font-weight:900;font-size:20px;font-family:'Bebas Neue';">N</span>
        <span style="font-size:13px;letter-spacing:2px;color:#ddd;">SERIES</span>
      </div>
      <h1>${esc(featured.title)}</h1>
      <p>${esc(featured.description||'')}</p>
      <div class="hero-btns">
        <button class="btn btn-play" onclick="openDetail('${featured.id}')">▶ 재생</button>
        <button class="btn btn-info" onclick="event.stopPropagation(); toggleWishlist('${featured.id}')">${wished?'✓ 찜한 콘텐츠':'+ 찜하기'}</button>
      </div>
    </div>`;
}

function cardHtml(it){
  const adminBtns = isAdmin ? `<div class="admin-actions">
      <button class="admin-mini" onclick="event.stopPropagation(); openAdminForm('${it.id}')">수정</button>
      <button class="admin-mini" onclick="event.stopPropagation(); deleteItem('${it.id}')">삭제</button>
    </div>` : '';
  const wished = wishlist.has(it.id);
  return `<div class="card" onclick="openDetail('${it.id}')">
      ${adminBtns}
      <img src="${it.thumbnailUrl}" alt="${esc(it.title)}" loading="lazy">
      <button class="wish-btn ${wished?'active':''}" onclick="event.stopPropagation(); toggleWishlist('${it.id}')">${wished?'✓':'+'}</button>
      <div class="cinfo">${esc(it.title)}</div>
    </div>`;
}
function toggleWishlist(id){
  if(wishlist.has(id)) wishlist.delete(id); else wishlist.add(id);
  saveProfileState();
  renderAll();
}

function posterRowHtml(title, items, rowId){
  if(!items.length) return '';
  return `<div class="row" ${rowId?`id="${rowId}"`:''}>
      <div class="row-title">${esc(title)}</div>
      <div class="row-track-wrap">
        <button class="row-arrow left" onclick="scrollRow(this,-1)">&#10094;</button>
        <div class="row-track">${items.map(cardHtml).join('')}</div>
        <button class="row-arrow right" onclick="scrollRow(this,1)">&#10095;</button>
      </div>
    </div>`;
}
function recommendedItems(pItems, usedIds){
  const likedCats = new Set(pItems.filter(i=>wishlist.has(i.id)).map(i=>i.category));
  return pItems
    .filter(i=>!usedIds.has(i.id))
    .sort((a,b)=>(likedCats.has(b.category)?1:0)-(likedCats.has(a.category)?1:0))
    .slice(0,10);
}
function renderRows(){
  const rowsEl = document.getElementById('rows');
  const pItems = profileItems();
  if(pItems.length === 0){
    rowsEl.innerHTML = ITEMS.length===0 ? '' : '<p style="color:#999;padding:100px 40px;text-align:center;">이 프로필에 등록된 콘텐츠가 없습니다. 관리자 패널에서 이 프로필에 항목을 추가해보세요.</p>';
    return;
  }
  const wishedItems = pItems.filter(i=>wishlist.has(i.id));
  const recentItems = recentlyViewed.map(id=>pItems.find(i=>i.id===id)).filter(Boolean).filter(i=>!wishlist.has(i.id));
  const usedIds = new Set([...wishedItems, ...recentItems].map(i=>i.id));

  let html = '';
  html += posterRowHtml('내가 찜한 리스트', wishedItems);
  html += posterRowHtml('마음에 쏙 드실 거예요', recommendedItems(pItems, usedIds));
  html += posterRowHtml('시청 중인 콘텐츠', recentItems);
  rowsEl.innerHTML = html;
}
function seriesGridHtml(title, items){
  if(!items.length) return '';
  return `<div class="row">
      <div class="row-title">${esc(title)}</div>
      <div class="series-grid">${items.map(it=>`<div class="series-card" onclick="openDetail('${it.id}')"><img src="${it.thumbnailUrl}" alt="${esc(it.title)}" loading="lazy"></div>`).join('')}</div>
    </div>`;
}
function renderSeriesPage(){
  const rowsEl = document.getElementById('rows');
  const pItems = profileItems();
  if(pItems.length === 0){
    rowsEl.innerHTML = ITEMS.length===0 ? '' : '<p style="color:#999;padding:100px 40px;text-align:center;">등록된 콘텐츠가 없습니다.</p>';
    return;
  }
  const grouped = groupByCategory(pItems);
  rowsEl.innerHTML = Object.entries(grouped).map(([cat, items])=>seriesGridHtml(cat, items)).join('');
}
function scrollRow(btn, dir){
  const track = btn.parentElement.querySelector('.row-track');
  track.scrollBy({left: dir*600, behavior:'smooth'});
}

function renderAll(){
  document.getElementById('loadingWrap').classList.add('hidden');
  const rowsEl = document.getElementById('rows');
  if(currentProfile === '블루베리'){
    rowsEl.classList.remove('no-hero');
    renderHero();
    renderRows();
  } else {
    document.getElementById('hero').classList.add('hidden');
    rowsEl.classList.add('no-hero');
    renderSeriesPage();
  }
}

/* ===================== SEARCH ===================== */
document.getElementById('searchBtn').onclick = ()=>{
  const input = document.getElementById('searchInput');
  input.classList.toggle('open');
  if(input.classList.contains('open')) input.focus();
  else { input.value=''; doSearch(''); }
};
document.getElementById('searchInput').addEventListener('input', e=>doSearch(e.target.value));
function doSearch(q){
  q = q.trim().toLowerCase();
  const hero = document.getElementById('hero');
  const rowsEl = document.getElementById('rows');
  const titleEl = document.getElementById('searchResultsTitle');
  if(!q){
    titleEl.classList.add('hidden');
    hero.classList.remove('hidden');
    renderRows();
    return;
  }
  hero.classList.add('hidden');
  titleEl.classList.remove('hidden');
  const results = profileItems().filter(i => (i.title||'').toLowerCase().includes(q) || (i.category||'').toLowerCase().includes(q));
  titleEl.textContent = `"${q}" 검색 결과 (${results.length})`;
  rowsEl.innerHTML = `<div class="grid-view">${results.map(cardHtml).join('') || '<p style="color:#999;padding:20px;">검색 결과가 없습니다.</p>'}</div>`;
}
document.getElementById('logoBtn').onclick = ()=>{
  document.getElementById('searchInput').value='';
  document.getElementById('searchInput').classList.remove('open');
  doSearch('');
  window.scrollTo({top:0, behavior:'smooth'});
};

/* ===================== DETAIL MODAL ===================== */
function openDetail(id){
  const it = ITEMS.find(i=>i.id===id);
  if(!it) return;
  recentlyViewed = [id, ...recentlyViewed.filter(x=>x!==id)].slice(0,10);
  saveProfileState();
  if(currentProfile === '블루베리') renderRows();
  const box = document.getElementById('modalBox');
  box.className = 'modal-box modal-box-lg';
  let mediaHtml = '';
  let galleryHtml = '';
  if(it.type === 'youtube'){
    mediaHtml = `<div class="modal-media"><iframe src="https://www.youtube.com/embed/${it.youtubeId}?autoplay=1&rel=0" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe></div>`;
  } else {
    currentGalleryImages = (it.images && it.images.length) ? it.images : [it.thumbnailUrl];
    mediaHtml = `<div class="modal-media photo-media"><img id="mainGalleryImg" src="${currentGalleryImages[0]}" alt="${esc(it.title)}"></div>`;
    if(currentGalleryImages.length > 1){
      galleryHtml = `<div class="gallery-strip">${currentGalleryImages.map((url,idx)=>
        `<img src="${url}" class="${idx===0?'active':''}" onclick="switchGalleryImg('${url}', this)">`).join('')}</div>`;
    }
  }
  box.innerHTML = `
    <button class="modal-close" onclick="closeDetail()">✕</button>
    ${mediaHtml}
    ${galleryHtml}
    <div class="modal-body">
      ${it.title ? `<h2>${esc(it.title)}</h2>` : ''}
      <div class="modal-cat">${esc(it.category||'기타')}</div>
      <div class="modal-desc">${esc(it.description||'설명이 없습니다.')}</div>
    </div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function switchGalleryImg(url, el){
  document.getElementById('mainGalleryImg').src = url;
  el.parentElement.querySelectorAll('img').forEach(im=>im.classList.remove('active'));
  el.classList.add('active');
}
function closeDetail(){
  document.getElementById('modalOverlay').classList.add('hidden');
  const box = document.getElementById('modalBox');
  box.innerHTML = ''; box.className = 'modal-box';
}
document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target.id === 'modalOverlay') closeDetail();
});

/* ===================== FIRESTORE LIVE SYNC ===================== */
let dataLoaded = false;
db.collection('items').orderBy('createdAt','desc').onSnapshot(snap=>{
  dataLoaded = true;
  ITEMS = snap.docs.filter(d=>d.id!=='_profileSettings').map(d=>({id:d.id, ...d.data()}));
  const settingsDoc = snap.docs.find(d=>d.id==='_profileSettings');
  PROFILE_IMAGES = settingsDoc ? (settingsDoc.data().images||{}) : PROFILE_IMAGES;
  applyProfileImages();
  renderAll();
}, err=>{
  dataLoaded = true;
  document.getElementById('loadingWrap').innerHTML = `<p style="color:#e50914;padding:20px;">데이터를 불러오지 못했습니다: ${esc(err.message)}<br>Firestore 보안 규칙 및 콘솔 설정을 확인해주세요.</p>`;
});
// 데이터가 없거나 응답이 늦어도 스피너가 무한 로딩처럼 보이지 않도록 안전장치
setTimeout(()=>{
  if(!dataLoaded) renderAll();
}, 1500);

/* ===================== NAV SCROLL EFFECT ===================== */
window.addEventListener('scroll', ()=>{
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60);
});

/* ===================== AUTH / ADMIN ===================== */
document.getElementById('adminBtn').textContent = isAdmin ? '관리자 패널' : '관리자';
document.getElementById('adminBtn').onclick = ()=> isAdmin ? openAdminPanel() : openLoginForm();
document.getElementById('adminOverlay').addEventListener('click', e=>{
  if(e.target.id === 'adminOverlay') closeAdmin();
});
function closeAdmin(){
  document.getElementById('adminOverlay').classList.add('hidden');
  document.getElementById('adminBox').innerHTML = '';
  editingId = null;
}

const ADMIN_PASSWORD = '2026';
function openLoginForm(){
  document.getElementById('adminBox').innerHTML = `
    <button class="modal-close" onclick="closeAdmin()">✕</button>
    <h2>관리자 로그인</h2>
    <div id="loginStatus"></div>
    <form id="loginForm">
      <div class="field"><label>비밀번호</label><input type="password" id="loginPassword" required></div>
      <button type="submit" class="admin-submit">로그인</button>
    </form>`;
  document.getElementById('adminOverlay').classList.remove('hidden');
  document.getElementById('loginForm').onsubmit = (e)=>{
    e.preventDefault();
    const pw = document.getElementById('loginPassword').value;
    const statusEl = document.getElementById('loginStatus');
    if(pw === ADMIN_PASSWORD){
      isAdmin = true;
      document.getElementById('adminBtn').textContent = '관리자 패널';
      renderRows();
      openAdminPanel();
    }else{
      statusEl.innerHTML = `<div class="status-msg err">비밀번호가 틀렸습니다</div>`;
    }
  };
}

function openAdminPanel(){
  editingId = null;
  document.getElementById('adminBox').innerHTML = `
    <button class="modal-close" onclick="closeAdmin()">✕</button>
    <h2>관리자 패널</h2>
    <div class="admin-tabs">
      <button class="admin-tab active" id="tabAdd" onclick="switchAdminTab('add')">항목 추가/수정</button>
      <button class="admin-tab" id="tabList" onclick="switchAdminTab('list')">전체 목록 (${ITEMS.length})</button>
      <button class="admin-tab" id="tabProfiles" onclick="switchAdminTab('profiles')">프로필 이미지</button>
    </div>
    <div id="adminTabContent"></div>
    <button class="admin-cancel" onclick="isAdmin=false; document.getElementById('adminBtn').textContent='관리자'; renderRows(); closeAdmin();">로그아웃</button>`;
  document.getElementById('adminOverlay').classList.remove('hidden');
  switchAdminTab('add');
}
function switchAdminTab(tab){
  document.getElementById('tabAdd').classList.toggle('active', tab==='add');
  document.getElementById('tabList').classList.toggle('active', tab==='list');
  document.getElementById('tabProfiles').classList.toggle('active', tab==='profiles');
  if(tab==='add') renderAddForm();
  else if(tab==='list') renderAdminList();
  else renderProfileForm();
}
function renderProfileForm(){
  const content = document.getElementById('adminTabContent');
  content.innerHTML = `
    <div id="profileFormStatus"></div>
    ${PROFILES.map(p=>`
      <div class="field">
        <label>${PROFILE_EMOJI[p]} ${p} 프로필 이미지</label>
        ${PROFILE_IMAGES[p]?`<img src="${PROFILE_IMAGES[p]}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-bottom:8px;display:block;">`:''}
        <input type="file" accept="image/*" data-p="${p}" class="fProfileImg">
      </div>`).join('')}
    <button type="button" class="admin-submit" id="saveProfileImgsBtn">저장</button>`;
  document.getElementById('saveProfileImgsBtn').onclick = async ()=>{
    const statusEl = document.getElementById('profileFormStatus');
    const btn = document.getElementById('saveProfileImgsBtn');
    btn.disabled = true; btn.textContent = '저장 중...';
    try{
      const updates = {...PROFILE_IMAGES};
      for(const inp of document.querySelectorAll('.fProfileImg')){
        if(inp.files[0]) updates[inp.dataset.p] = await uploadToCloudinary(inp.files[0]);
      }
      await db.collection('items').doc('_profileSettings').set({images:updates, createdAt:firebase.firestore.FieldValue.serverTimestamp()}, {merge:true});
      statusEl.innerHTML = `<div class="status-msg ok">저장되었습니다.</div>`;
    }catch(err){
      statusEl.innerHTML = `<div class="status-msg err">오류: ${esc(err.message)}</div>`;
    }finally{
      btn.disabled = false; btn.textContent = '저장';
    }
  };
}
function renderAdminList(){
  const content = document.getElementById('adminTabContent');
  if(ITEMS.length===0){ content.innerHTML = '<p style="color:#888;">등록된 항목이 없습니다.</p>'; return; }
  content.innerHTML = ITEMS.map(it=>`
    <div class="admin-list-item">
      <img src="${it.thumbnailUrl}">
      <div style="flex:1;">
        <div class="ali-title">${esc(it.title)}</div>
        <div class="ali-cat">${esc(it.category||'기타')} · ${it.type==='youtube'?'영상':'사진'} · ${(it.profiles&&it.profiles.length)?it.profiles.map(p=>PROFILE_EMOJI[p]||p).join(' '):'전체 프로필'}</div>
      </div>
      <button class="ali-btn" onclick="openAdminForm('${it.id}')">수정</button>
      <button class="ali-btn danger" onclick="deleteItem('${it.id}')">삭제</button>
    </div>`).join('');
}
function openAdminForm(id){
  editingId = id;
  document.getElementById('tabAdd').classList.add('active');
  document.getElementById('tabList').classList.remove('active');
  renderAddForm();
}

function renderAddForm(){
  const it = editingId ? ITEMS.find(i=>i.id===editingId) : null;
  const cats = [...new Set(ITEMS.map(i=>i.category||'기타'))];
  const content = document.getElementById('adminTabContent');
  content.innerHTML = `
    <div id="formStatus"></div>
    <form id="itemForm">
      <div class="field">
        <label>유형</label>
        <select id="fType">
          <option value="youtube" ${it&&it.type==='youtube'?'selected':''}>유튜브 영상</option>
          <option value="photo" ${it&&it.type==='photo'?'selected':''}>사진</option>
        </select>
      </div>
      <div class="field"><label>제목 (사진 항목은 선택사항)</label><input type="text" id="fTitle" value="${it?esc(it.title):''}"></div>
      <div class="field">
        <label>카테고리 (직접 입력 가능)</label>
        <input type="text" id="fCategory" list="catList" value="${it?esc(it.category||''):''}" placeholder="예: 여행, 브이로그, 인물">
        <datalist id="catList">${cats.map(c=>`<option value="${esc(c)}">`).join('')}</datalist>
      </div>
      <div class="field">
        <label>노출할 프로필 (선택 안 하면 전체 프로필에 노출)</label>
        <div class="check-row" style="gap:16px;">
          ${PROFILES.map(p=>{
            const checked = it ? (it.profiles||[]).includes(p) : (p===currentProfile);
            return `<label style="display:flex;align-items:center;gap:5px;margin:0;font-size:13px;color:#ccc;"><input type="checkbox" class="fProfile" value="${p}" ${checked?'checked':''}>${PROFILE_EMOJI[p]||''} ${p}</label>`;
          }).join('')}
        </div>
      </div>
      <div class="field"><label>설명</label><textarea id="fDesc">${it?esc(it.description||''):''}</textarea></div>
      <div class="field" id="youtubeField">
        <label>유튜브 링크 (또는 영상 ID)</label>
        <input type="text" id="fYoutubeUrl" value="${it&&it.youtubeId?'https://youtu.be/'+it.youtubeId:''}" placeholder="https://youtu.be/...">
      </div>
      <div class="field">
        <label>썸네일 이미지 (카드/히어로에 표시될 대표 이미지, 필수)</label>
        <input type="file" id="fThumb" accept="image/*" ${it?'':'required'}>
        ${it ? `<img src="${it.thumbnailUrl}" style="width:100px;margin-top:8px;border-radius:4px;">`:''}
      </div>
      <div class="check-row">
        <input type="checkbox" id="fFeatured" ${it&&it.featured?'checked':''}>
        <label for="fFeatured" style="margin:0;">메인 히어로 배너로 노출</label>
      </div>
      <button type="submit" class="admin-submit">${it?'수정 저장':'항목 추가'}</button>
      ${it?`<button type="button" class="admin-cancel" onclick="editingId=null; renderAddForm();">새 항목 추가로 전환</button>`:''}
    </form>`;

  function toggleTypeFields(){
    const t = document.getElementById('fType').value;
    document.getElementById('youtubeField').classList.toggle('hidden', t!=='youtube');
  }
  document.getElementById('fType').onchange = toggleTypeFields;
  toggleTypeFields();

  document.getElementById('itemForm').onsubmit = async (e)=>{
    e.preventDefault();
    const statusEl = document.getElementById('formStatus');
    const submitBtn = e.target.querySelector('.admin-submit');
    submitBtn.disabled = true; submitBtn.textContent = '저장 중...';
    try{
      const type = document.getElementById('fType').value;
      const title = document.getElementById('fTitle').value.trim();
      const category = document.getElementById('fCategory').value.trim() || '기타';
      const description = document.getElementById('fDesc').value.trim();
      const featured = document.getElementById('fFeatured').checked;
      if(type==='youtube' && !title) throw new Error('제목을 입력해주세요.');

      let youtubeId = it ? it.youtubeId : null;
      if(type === 'youtube'){
        const url = document.getElementById('fYoutubeUrl').value.trim();
        if(url){ youtubeId = extractYoutubeId(url); if(!youtubeId) throw new Error('유효한 유튜브 링크가 아닙니다.'); }
        if(!youtubeId) throw new Error('유튜브 링크를 입력해주세요.');
      }

      let thumbnailUrl = it ? it.thumbnailUrl : null;
      const thumbFile = document.getElementById('fThumb').files[0];
      if(thumbFile){
        statusEl.innerHTML = `<div class="status-msg ok">썸네일 업로드 중...</div>`;
        thumbnailUrl = await uploadToCloudinary(thumbFile);
      }
      if(!thumbnailUrl) throw new Error('썸네일 이미지를 업로드해주세요.');

      const profiles = [...document.querySelectorAll('.fProfile:checked')].map(el=>el.value);
      const payload = { title, category, description, type, featured, thumbnailUrl, profiles, images: [] };
      if(type === 'youtube'){ payload.youtubeId = youtubeId; }
      else { payload.youtubeId = null; }

      if(editingId){
        await db.collection('items').doc(editingId).update(payload);
        statusEl.innerHTML = `<div class="status-msg ok">수정되었습니다.</div>`;
      } else {
        payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('items').add(payload);
        statusEl.innerHTML = `<div class="status-msg ok">추가되었습니다.</div>`;
        e.target.reset();
        editingId = null;
      }
    }catch(err){
      statusEl.innerHTML = `<div class="status-msg err">오류: ${esc(err.message)}</div>`;
    }finally{
      submitBtn.disabled = false; submitBtn.textContent = editingId ? '수정 저장' : '항목 추가';
    }
  };
}

async function deleteItem(id){
  if(!confirm('이 항목을 삭제하시겠습니까?')) return;
  try{
    await db.collection('items').doc(id).delete();
    if(document.getElementById('tabList')) renderAdminList();
  }catch(err){
    alert('삭제 실패: ' + err.message);
  }
}
</script>
